<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Commerce | www</title>
    <meta name="description" content="3 ürünlü, hesapsız standart e-ticaret storefront" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="http://localhost:3000/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mini Commerce" />
    <meta property="og:description" content="Üyeliksiz alışveriş · Güvenli ödeme · Hızlı teslimat" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Mini Commerce",
        "url": "http://localhost:3000"
      }
    </script>
    <script>
      (function initConfig() {
        var host = window.location.hostname;
        var config;

        if (host === 'www.localhost') {
          config = { apiBaseUrl: 'http://api.localhost', cdnBaseUrl: 'http://cdn.localhost' };
        } else if (host === 'localhost' || host === '127.0.0.1') {
          config = { apiBaseUrl: 'http://localhost:3001', cdnBaseUrl: 'http://localhost:3002' };
        } else {
          config = { apiBaseUrl: 'https://api.example.com', cdnBaseUrl: 'https://cdn.example.com' };
        }

        window.__APP_CONFIG__ = config;
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = config.cdnBaseUrl + '/assets/css/store.css';
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <header class="shell header">
      <div>
        <h1>Mini Commerce</h1>
        <p>Üyeliksiz alışveriş · Güvenli ödeme · Hızlı teslimat</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <a href="/account.html" class="ghost" style="padding:10px 12px;border-radius:10px;text-decoration:none;">Hesabım</a>
        <a href="/cart.html" class="ghost" style="padding:10px 12px;border-radius:10px;text-decoration:none;">Sepetim (<strong id="header-cart-count">0</strong>)</a>
        <a href="/admin.html" class="ghost" style="padding:10px 12px;border-radius:10px;text-decoration:none;">Admin</a>
      </div>
    </header>

    <section class="shell toolbar">
      <input id="search-input" type="search" placeholder="Ürün ara..." />
      <select id="category-select">
        <option value="">Kategori: Tümü</option>
      </select>
      <select id="sort-select">
        <option value="featured">Sırala: Öne çıkan</option>
        <option value="price_asc">Fiyat artan</option>
        <option value="price_desc">Fiyat azalan</option>
        <option value="name_asc">İsim A-Z</option>
      </select>
    </section>

    <main class="shell">
      <div class="grid" id="product-list"></div>
      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <footer class="shell footer">
      <small>İade: 14 gün · Destek: destek@mini-commerce.local · KVKK & Mesafeli satış sözleşmesi</small>
      <div style="margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;">
        <a href="/page.html?slug=hakkimizda">Hakkımızda</a>
        <a href="/page.html?slug=kvkk">KVKK</a>
      </div>
    </footer>

    <script src="./store.js" defer></script>
  </body>
</html>
