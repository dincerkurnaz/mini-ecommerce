# Örnek Nginx reverse proxy (www/api/cdn subdomain)
# Cloudflare arkasında origin sunucuda kullanıma uygundur.

upstream ecommerce_www {
    server www:80;
}

upstream ecommerce_api {
    server api:3001;
}

upstream ecommerce_cdn {
    server cdn:80;
}

server {
    listen 80;
    server_name www.example.com www.localhost;

    location / {
        proxy_pass http://ecommerce_www;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.example.com api.localhost;

    location / {
        proxy_pass http://ecommerce_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name cdn.example.com cdn.localhost;

    location / {
        proxy_pass http://ecommerce_cdn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
