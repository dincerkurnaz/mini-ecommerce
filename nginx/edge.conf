# Local docker compose edge gateway
# www.localhost -> www
# api.localhost -> api
# cdn.localhost -> cdn

server {
    listen 80;
    server_name www.localhost;

    location / {
        proxy_pass http://www:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name api.localhost;

    location / {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name cdn.localhost;

    location / {
        proxy_pass http://cdn:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
